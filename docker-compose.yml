services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opstrack
      POSTGRES_PASSWORD: opstrack_dev
      POSTGRES_DB: opstrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opstrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./apps/backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://opstrack:opstrack_dev@postgres:5432/opstrack
      JWT_SECRET: dev_secret_change_in_prod
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  ai:
    build: ./services/ai
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_URL: postgresql://opstrack:opstrack_dev@postgres:5432/opstrack
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./apps/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_AI_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
